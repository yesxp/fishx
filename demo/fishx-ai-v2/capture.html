<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>记录渔获 · FishX 2.0</title>
<style>
  :root{
    --blurple:#5865F2;
    --blurple-2:#8B5CF6;
    --ink:#FFFFFF;
    --ink-2:rgba(255,255,255,.85);
    --muted:rgba(255,255,255,.65);
    --faint:rgba(255,255,255,.4);
    --glass:rgba(20,20,30,.40);
    --glass-strong:rgba(20,20,30,.65);
    --border:rgba(255,255,255,.12);
    --good:#34C759;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
    letter-spacing:-.01em;
  }

  /* Device frame */
  .device{
    width:393px;height:852px;margin:0 auto;
    background:#000;
    position:relative;overflow:hidden;
    border-radius:48px;
    box-shadow:0 0 0 12px #1C1C1E,0 30px 80px rgba(0,0,0,.4);
  }
  @media (max-width:480px){.device{width:100vw;height:100vh;border-radius:0;box-shadow:none}}

  /* ─── Camera preview mock ─── */
  .camera-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 30% 20%,#3D5A4A 0%,#1A2A22 50%,#0A1410 100%),
      #0A1410;
    background-blend-mode:multiply;
  }
  .camera-bg::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 20% 70%,rgba(255,200,100,.10) 0%,transparent 40%),
      radial-gradient(circle at 80% 30%,rgba(100,180,220,.08) 0%,transparent 40%);
  }
  /* Subtle fish-like blob */
  .camera-bg::after{
    content:"";position:absolute;top:38%;left:30%;width:160px;height:80px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(255,220,160,.18) 0%,transparent 70%);
    filter:blur(8px);
    animation:float 6s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-10px)}}

  /* Status bar — light text on dark */
  .statusbar{
    position:relative;height:54px;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px 0;color:#fff;font-weight:600;font-size:15px;z-index:5;
  }
  .statusbar svg{width:18px;height:18px}

  /* Top bar */
  .topbar{
    position:relative;z-index:5;
    padding:10px 20px 14px;display:flex;align-items:center;justify-content:space-between;
  }
  .iconbtn{
    width:40px;height:40px;border-radius:50%;
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    display:grid;place-items:center;border:1px solid var(--border);color:#fff;
  }
  .iconbtn svg{width:18px;height:18px}

  .topbar-title{
    font-size:14px;font-weight:600;color:var(--ink-2);text-align:center;
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    padding:8px 14px;border-radius:var(--r-pill,100px);border:1px solid var(--border);
    display:inline-flex;align-items:center;gap:6px;
  }
  .topbar-title .dot{width:6px;height:6px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 3px rgba(52,199,89,.3);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* ─── Viewfinder overlay ─── */
  .viewfinder{
    position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:2;
  }
  .vf-box{
    position:relative;width:280px;height:280px;
  }
  /* Corner brackets */
  .vf-box::before,.vf-box::after,
  .vf-box > i:nth-child(1),.vf-box > i:nth-child(2){
    content:"";position:absolute;width:36px;height:36px;
  }
  .vf-box::before{top:0;left:0;border-top:3px solid #fff;border-left:3px solid #fff;border-top-left-radius:16px}
  .vf-box::after{top:0;right:0;border-top:3px solid #fff;border-right:3px solid #fff;border-top-right-radius:16px}
  .vf-box > i:nth-child(1){bottom:0;left:0;border-bottom:3px solid #fff;border-left:3px solid #fff;border-bottom-left-radius:16px;display:block}
  .vf-box > i:nth-child(2){bottom:0;right:0;border-bottom:3px solid #fff;border-right:3px solid #fff;border-bottom-right-radius:16px;display:block}
  .vf-box > i{display:none}
  /* scanning line */
  .scan{
    position:absolute;left:8px;right:8px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--blurple),transparent);
    box-shadow:0 0 18px rgba(88,101,242,.8);
    top:0;animation:scan 2.4s ease-in-out infinite;
  }
  @keyframes scan{
    0%,100%{top:8px;opacity:0}
    10%,90%{opacity:1}
    50%{top:calc(100% - 10px)}
  }

  .vf-hint{
    position:absolute;left:0;right:0;text-align:center;
    bottom:-44px;font-size:13px;color:var(--ink-2);font-weight:500;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
  }

  /* ─── Category switcher (top-mid floating) ─── */
  .cat-switch{
    position:absolute;left:0;right:0;top:170px;
    display:flex;justify-content:center;gap:6px;z-index:4;
  }
  .cat-pill{
    padding:8px 14px;border-radius:100px;font-size:12px;font-weight:600;
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--border);color:var(--ink-2);cursor:pointer;
  }
  .cat-pill.active{
    background:rgba(255,255,255,.95);color:#1C1C1E;border-color:transparent;
  }

  /* ─── Bottom panel (AI result preview) ─── */
  .bottom{
    position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.7) 30%,rgba(0,0,0,.92));
    padding:60px 20px 0;z-index:5;
  }
  /* AI overlay card (semi-over camera) */
  .ai-card{
    background:var(--glass-strong);
    backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    margin-bottom:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.30);
  }
  .ai-emoji{
    width:48px;height:48px;border-radius:14px;
    background:linear-gradient(135deg,var(--blurple),var(--blurple-2));
    display:grid;place-items:center;font-size:24px;flex-shrink:0;
    box-shadow:0 4px 12px rgba(88,101,242,.40);
  }
  .ai-body{flex:1;min-width:0}
  .ai-title{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
  .ai-tag{
    display:inline-flex;align-items:center;gap:3px;
    padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;
    background:rgba(139,92,246,.30);color:#E0D7FF;border:1px dashed rgba(139,92,246,.5);
  }
  .ai-tag svg{width:9px;height:9px}
  .ai-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}

  /* Category chips for fish species */
  .fish-chips{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
  .fish-chips::-webkit-scrollbar{display:none}
  .fish-chip{
    flex-shrink:0;padding:7px 12px;border-radius:100px;font-size:12px;font-weight:600;
    background:var(--glass);color:var(--ink-2);border:1px solid var(--border);
    display:flex;align-items:center;gap:5px;
  }
  .fish-chip.active{background:rgba(255,255,255,.95);color:#1C1C1E;border-color:transparent}
  .fish-chip .e{font-size:13px}

  /* Bottom shutter row */
  .shutter-row{
    display:flex;align-items:center;justify-content:space-between;padding:0 24px 36px;
  }
  .album-btn{
    width:48px;height:48px;border-radius:14px;border:1.5px solid rgba(255,255,255,.4);
    background:var(--glass);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:grid;place-items:center;color:#fff;
  }
  .album-btn svg{width:20px;height:20px}

  .shutter{
    width:78px;height:78px;border-radius:50%;border:none;cursor:pointer;
    background:#fff;position:relative;
    display:grid;place-items:center;
    box-shadow:0 0 0 4px rgba(255,255,255,.2),0 0 0 8px rgba(255,255,255,.06);
    transition:transform .15s ease;
  }
  .shutter:active{transform:scale(.92)}
  .shutter::before{
    content:"";width:64px;height:64px;border-radius:50%;
    border:2px solid #1C1C1E;
  }
  .flip-btn{
    width:48px;height:48px;border-radius:50%;background:var(--glass);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border);color:#fff;display:grid;place-items:center;
  }
  .flip-btn svg{width:22px;height:22px}

  /* Recenter btn */
  .recenter{
    position:absolute;right:20px;bottom:200px;z-index:6;
    width:40px;height:40px;border-radius:50%;
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--border);color:#fff;display:grid;place-items:center;
  }
  .recenter svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="device">
  <div class="camera-bg"></div>

  <!-- Status bar -->
  <div class="statusbar">
    <span>9:41</span>
    <span style="display:flex;align-items:center;gap:6px">
      <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="3" width="3" height="9" rx="1"/><rect x="10" y="0" width="3" height="12" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".4"/></svg>

  <div class="recenter">

  <!-- Bottom panel -->
  <div class="bottom">
